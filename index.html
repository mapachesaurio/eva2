<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManhwaTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #222222;
      --red: #e63946;
      --red-dark: #7a0000;
      --red-dim: #2a0a0a;
      --text: #f0f0f0;
      --text-muted: #777777;
      --border: #2a2a2a;
      --fab-size: 56px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 88px;
    }

    /* LOADING */
    .loading-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 998;
    }
    .loading-screen.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* LOGIN */
    .login-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 999; padding: 40px 24px;
    }
    .login-screen.hidden { display: none; }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 46px; letter-spacing: 3px;
      text-align: center; line-height: 1;
    }
    .login-logo span { color: var(--red); }
    .login-sub {
      font-size: 13px; color: var(--text-muted);
      text-align: center; max-width: 260px; line-height: 1.6;
    }
    .btn-google {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 24px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      width: 100%; max-width: 280px; justify-content: center;
    }
    .btn-google:hover { border-color: var(--red); background: var(--surface2); }
    .login-error { font-size: 12px; color: var(--red); text-align: center; display: none; }
    .login-error.show { display: block; }

    /* HEADER */
    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 16px; position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 2px; color: var(--red); line-height: 1;
    }
    .header h1 span { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 4px; }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); cursor: pointer;
      transition: border-color 0.2s; object-fit: cover;
    }
    .user-avatar:hover { border-color: var(--red); }
    .logout-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 6px; border-radius: 8px;
      transition: color 0.2s; display: flex; align-items: center;
    }
    .logout-btn:hover { color: var(--red); }
    .search-wrapper { display: flex; align-items: center; gap: 4px; }
    .search-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 8px; border-radius: 8px;
      transition: color 0.2s; display: flex; align-items: center;
    }
    .search-btn:hover { color: var(--red); }
    .search-input-wrap { max-width: 0; overflow: hidden; transition: max-width 0.3s ease; }
    .search-input-wrap.open { max-width: 150px; }
    .search-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      width: 140px; outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--red); }

    /* TABS */
    .tabs {
      display: flex; background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 8px; overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 57px; z-index: 99;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      background: none; border: none; color: var(--text-muted);
      padding: 12px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: all 0.2s;
    }
    .tab.active { color: var(--red); border-bottom-color: var(--red); }

    /* COUNTERS */
    .counters {
      display: flex; gap: 8px; padding: 12px 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .counters::-webkit-scrollbar { display: none; }
    .counter-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0;
    }
    .counter-pill span { color: var(--red); font-weight: 600; }

    /* CARDS */
    .card-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; display: flex;
      transition: border-color 0.2s; animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .card:hover { border-color: var(--red-dark); }
    .card-cover { width: 80px; min-height: 110px; object-fit: cover; flex-shrink: 0; display: block; }
    .cover-placeholder {
      width: 80px; min-height: 110px; background: var(--red-dim);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .card-body { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 18px;
      letter-spacing: 1px; line-height: 1.1; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 155px;
    }
    .delete-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 2px; border-radius: 4px;
      flex-shrink: 0; transition: color 0.2s; display: flex; align-items: center;
    }
    .delete-btn:hover { color: var(--red); }
    .card-genre { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .status-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; width: fit-content;
    }
    .badge-leyendo    { background: #1a3a1a; color: #4caf50; }
    .badge-pendiente  { background: #1a1a3a; color: #5c9bd6; }
    .badge-completado { background: #2a1a00; color: #ff9800; }
    .card-controls { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
    .chapter-control {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 8px;
    }
    .chapter-label { font-size: 11px; color: var(--text-muted); }
    .chapter-input {
      background: none; border: none; color: var(--red);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 600; width: 48px; outline: none; text-align: center;
    }
    .status-select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      padding: 4px 8px; outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    .status-select:focus { border-color: var(--red); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state p { margin-top: 12px; font-size: 14px; }

    /* FAB */
    .fab {
      position: fixed; bottom: 24px;
      right: calc(50% - 240px + 24px);
      width: var(--fab-size); height: var(--fab-size);
      border-radius: 50%; background: var(--red); border: none;
      color: white; font-size: 30px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(230,57,70,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.25s, background 0.2s; z-index: 200;
    }
    @media (max-width: 480px) { .fab { right: 24px; } }
    .fab:hover { transform: scale(1.1); background: #c1121f; }
    .fab.open  { transform: rotate(45deg); background: #c1121f; }

    /* OVERLAY */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    /* BOTTOM SHEET */
    .bottom-sheet {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(110%);
      width: 100%; max-width: 480px;
      background: var(--surface); border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border); z-index: 400;
      padding: 0 20px 36px;
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      max-height: 92vh; overflow-y: auto;
    }
    .bottom-sheet.show { transform: translateX(-50%) translateY(0); }
    .sheet-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 12px auto 20px;
    }
    .sheet-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;
      letter-spacing: 1.5px; color: var(--red); margin-bottom: 20px;
    }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--red); }
    .form-input.error { border-color: var(--red); background: var(--red-dim); }
    .form-select option { background: #1a1a1a; }
    .form-error { font-size: 11px; color: var(--red); margin-top: 4px; display: none; }
    .form-error.show { display: block; }
    .btn-submit {
      width: 100%; background: var(--red); border: none;
      border-radius: 12px; padding: 14px; color: white;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      font-weight: 600; cursor: pointer; margin-top: 8px;
      letter-spacing: 0.5px; transition: background 0.2s, transform 0.1s;
    }
    .btn-submit:hover  { background: #c1121f; }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 92px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface); border: 1px solid var(--red-dark);
      border-radius: 10px; padding: 10px 20px;
      font-size: 13px; color: var(--text);
      z-index: 500; opacity: 0; pointer-events: none;
      transition: all 0.3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
  </div>

  <!-- Login -->
  <div class="login-screen hidden" id="loginScreen">
    <div class="login-logo">MANHWA<br><span>TRACKER</span></div>
    <p class="login-sub">Tu catálogo personal sincronizado en la nube.</p>
    <button class="btn-google" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.6-2.9-11.3-7.1L6 34c3.3 6.3 9.9 10 18 10z"/>
        <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.4-2.5 4.4-4.6 5.8l6.2 5.2C40.8 35.7 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/>
      </svg>
      Continuar con Google
    </button>
    <span class="login-error" id="loginError">Error al iniciar sesión. Intenta de nuevo.</span>
  </div>

  <!-- App -->
  <div id="app" style="display:none">
    <header class="header">
      <div class="header-top">
        <h1>MANHWA<span>TRACKER</span></h1>
        <div class="header-right">
          <div class="search-wrapper">
            <button class="search-btn" id="searchToggle" aria-label="Buscar">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </button>
            <div class="search-input-wrap" id="searchWrap">
              <input type="text" class="search-input" id="searchInput" placeholder="Buscar..." autocomplete="off">
            </div>
          </div>
          <img class="user-avatar" id="userAvatar" src="" alt="avatar">
          <button class="logout-btn" id="logoutBtn" title="Cerrar sesión">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-filter="todos">Todos</button>
      <button class="tab" data-filter="Leyendo">Leyendo</button>
      <button class="tab" data-filter="Pendiente">Pendiente</button>
      <button class="tab" data-filter="Completado">Completado</button>
    </nav>

    <div class="counters" id="counters"></div>
    <main class="card-list" id="cardList"></main>

    <button class="fab" id="fab" aria-label="Agregar manhwa">+</button>
    <div class="overlay" id="overlay"></div>

    <div class="bottom-sheet" id="bottomSheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">AGREGAR MANHWA</h2>

      <div class="form-group">
        <label class="form-label" for="inputTitle">Título</label>
        <input type="text" class="form-input" id="inputTitle" placeholder="Ej: Solo Leveling" maxlength="100" autocomplete="off">
        <span class="form-error" id="errorTitle">El título es obligatorio (máx. 100 caracteres).</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="inputGenre">Género</label>
        <select class="form-select" id="inputGenre">
          <option value="Acción">Acción</option>
          <option value="Romance">Romance</option>
          <option value="Fantasía">Fantasía</option>
          <option value="Terror">Terror</option>
          <option value="Drama">Drama</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="inputChapter">Capítulo actual</label>
        <input type="number" class="form-input" id="inputChapter" placeholder="0" min="0" value="0">
        <span class="form-error" id="errorChapter">Ingresa un número entero mayor o igual a 0.</span>
      </div>
      <div class="form-group">
        <label class="form-label" for="inputStatus">Estado</label>
        <select class="form-select" id="inputStatus">
          <option value="Leyendo">Leyendo</option>
          <option value="Pendiente">Pendiente</option>
          <option value="Completado">Completado</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="inputCover">URL de portada (opcional)</label>
        <input type="text" class="form-input" id="inputCover" placeholder="https://..." maxlength="500" autocomplete="off">
        <span class="form-error" id="errorCover">Ingresa una URL válida (https://...).</span>
      </div>

      <button class="btn-submit" id="btnSubmit">AGREGAR</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, query, orderBy, onSnapshot }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBg8iPH0yJr0dYkUhjnW7mw2jU3XNHnxQk",
      authDomain:        "apkm-131dd.firebaseapp.com",
      projectId:         "apkm-131dd",
      storageBucket:     "apkm-131dd.firebasestorage.app",
      messagingSenderId: "778996067554",
      appId:             "1:778996067554:web:1a9a9c1001262f7c4d02bb"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const ALLOWED_STATUSES = ['Leyendo', 'Pendiente', 'Completado'];
    const ALLOWED_GENRES   = ['Acción', 'Romance', 'Fantasía', 'Terror', 'Drama'];
    const URL_REGEX        = /^https?:\/\/[^\s]{3,}$/i;
    const TITLE_REGEX      = /^.{1,100}$/;

    const state = { items: [], filter: 'todos', search: '', uid: null, unsub: null };

    // Seguridad — Sanitización XSS
    function sanitizeInput(str) {
      return String(str).trim().replace(/[<>"'`&]/g, c =>
        ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;','&':'&amp;'}[c])
      );
    }

    function isValidUrl(url)    { return !url || url.trim() === '' || URL_REGEX.test(url.trim()); }
    function isValidTitle(t)    { return TITLE_REGEX.test(t.trim()); }
    function isValidChapter(v)  { const n = Number(v); return Number.isInteger(n) && n >= 0; }
    function isAllowedStatus(v) { return ALLOWED_STATUSES.includes(v); }
    function isAllowedGenre(v)  { return ALLOWED_GENRES.includes(v); }

    function userCol() { return collection(db, 'users', state.uid, 'manhwas'); }

    function subscribeToItems() {
      if (state.unsub) state.unsub();
      const q = query(userCol(), orderBy('createdAt', 'desc'));
      state.unsub = onSnapshot(q, snap => {
        state.items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList();
        renderCounters();
      });
    }

    async function addItem() {
      if (!validateForm()) return;
      const genre  = document.getElementById('inputGenre').value;
      const status = document.getElementById('inputStatus').value;
      if (!isAllowedGenre(genre) || !isAllowedStatus(status)) return;
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      try {
        await addDoc(userCol(), {
          title:     sanitizeInput(document.getElementById('inputTitle').value),
          genre, status,
          chapter:   parseInt(document.getElementById('inputChapter').value, 10) || 0,
          cover:     document.getElementById('inputCover').value.trim(),
          createdAt: Date.now(),
        });
        closeSheet(); resetForm(); showToast('Manhwa agregado ✓');
      } catch { showToast('Error al agregar.'); }
      finally  { btn.disabled = false; }
    }

    async function deleteItem(id) {
      try { await deleteDoc(doc(db, 'users', state.uid, 'manhwas', id)); showToast('Eliminado'); }
      catch { showToast('Error al eliminar.'); }
    }

    async function updateChapter(id, value) {
      if (!isValidChapter(value)) return;
      try { await updateDoc(doc(db, 'users', state.uid, 'manhwas', id), { chapter: parseInt(value, 10) }); }
      catch (e) { console.error(e); }
    }

    async function updateStatus(id, value) {
      if (!isAllowedStatus(value)) return;
      try { await updateDoc(doc(db, 'users', state.uid, 'manhwas', id), { status: value }); }
      catch (e) { console.error(e); }
    }

    function validateForm() {
      let valid = true;
      const se = (inp, err, show) => {
        document.getElementById(inp).classList.toggle('error', show);
        document.getElementById(err).classList.toggle('show', show);
        if (show) valid = false;
      };
      se('inputTitle',   'errorTitle',   !isValidTitle(document.getElementById('inputTitle').value));
      se('inputChapter', 'errorChapter', !isValidChapter(document.getElementById('inputChapter').value));
      const cover = document.getElementById('inputCover').value;
      se('inputCover', 'errorCover', cover.trim() !== '' && !isValidUrl(cover));
      return valid;
    }

    function filterByStatus(items) { return state.filter === 'todos' ? items : items.filter(i => i.status === state.filter); }
    function searchByTitle(items)  { if (!state.search.trim()) return items; const t = state.search.toLowerCase(); return items.filter(i => i.title.toLowerCase().includes(t)); }
    function getFiltered()         { return searchByTitle(filterByStatus(state.items)); }

    function createPlaceholder() {
      const ph = document.createElement('div'); ph.className = 'cover-placeholder';
      ph.innerHTML = `<svg width="26" height="26" fill="none" stroke="#e63946" stroke-width="1.5" viewBox="0 0 24 24" opacity="0.4"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`;
      return ph;
    }

    function createBadge(status) {
      const b = document.createElement('span');
      b.className = 'status-badge';
      b.classList.add({'Leyendo':'badge-leyendo','Pendiente':'badge-pendiente','Completado':'badge-completado'}[status] || 'badge-pendiente');
      b.textContent = status; return b;
    }

    function createCard(item) {
      const card = document.createElement('div'); card.className = 'card';
      if (item.cover && isValidUrl(item.cover)) {
        const img = document.createElement('img');
        img.className = 'card-cover'; img.src = item.cover; img.alt = ''; img.loading = 'lazy';
        img.onerror = () => img.replaceWith(createPlaceholder());
        card.appendChild(img);
      } else { card.appendChild(createPlaceholder()); }

      const body = document.createElement('div'); body.className = 'card-body';
      const hdr  = document.createElement('div'); hdr.className = 'card-header';

      const ttl = document.createElement('div'); ttl.className = 'card-title'; ttl.textContent = item.title;
      const del = document.createElement('button'); del.className = 'delete-btn'; del.setAttribute('aria-label','Eliminar');
      del.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>`;
      del.addEventListener('click', () => deleteItem(item.id));

      hdr.appendChild(ttl); hdr.appendChild(del);
      const genre = document.createElement('div'); genre.className = 'card-genre'; genre.textContent = item.genre;

      const ctrl = document.createElement('div'); ctrl.className = 'card-controls';
      const chWrap = document.createElement('div'); chWrap.className = 'chapter-control';
      const chLbl  = document.createElement('span'); chLbl.className = 'chapter-label'; chLbl.textContent = 'Cap.';
      const chInp  = document.createElement('input'); chInp.type = 'number'; chInp.className = 'chapter-input';
      chInp.value = item.chapter; chInp.min = '0'; chInp.setAttribute('aria-label','Capítulo');
      chInp.addEventListener('change', e => updateChapter(item.id, e.target.value));
      chWrap.appendChild(chLbl); chWrap.appendChild(chInp);

      const stSel = document.createElement('select'); stSel.className = 'status-select'; stSel.setAttribute('aria-label','Estado');
      ALLOWED_STATUSES.forEach(opt => {
        const o = document.createElement('option'); o.value = opt; o.textContent = opt;
        if (opt === item.status) o.selected = true; stSel.appendChild(o);
      });
      stSel.addEventListener('change', e => updateStatus(item.id, e.target.value));

      ctrl.appendChild(chWrap); ctrl.appendChild(stSel);
      body.appendChild(hdr); body.appendChild(genre); body.appendChild(createBadge(item.status)); body.appendChild(ctrl);
      card.appendChild(body); return card;
    }

    function renderList() {
      const c = document.getElementById('cardList');
      while (c.firstChild) c.removeChild(c.firstChild);
      const filtered = getFiltered();
      if (!filtered.length) {
        const e = document.createElement('div'); e.className = 'empty-state';
        e.innerHTML = `<svg width="48" height="48" fill="none" stroke="#333" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`;
        const p = document.createElement('p');
        p.textContent = state.items.length === 0 ? 'Sin manhwas. Agrega uno con el botón +' : 'Sin resultados.';
        e.appendChild(p); c.appendChild(e); return;
      }
      const frag = document.createDocumentFragment();
      filtered.forEach(item => frag.appendChild(createCard(item)));
      c.appendChild(frag);
    }

    function renderCounters() {
      const c = document.getElementById('counters');
      while (c.firstChild) c.removeChild(c.firstChild);
      const counts = { Total: state.items.length, Leyendo: state.items.filter(i=>i.status==='Leyendo').length, Pendiente: state.items.filter(i=>i.status==='Pendiente').length, Completado: state.items.filter(i=>i.status==='Completado').length };
      const frag = document.createDocumentFragment();
      Object.entries(counts).forEach(([lbl, val]) => {
        const pill = document.createElement('div'); pill.className = 'counter-pill';
        pill.appendChild(document.createTextNode(lbl + ': '));
        const num = document.createElement('span'); num.textContent = val;
        pill.appendChild(num); frag.appendChild(pill);
      });
      c.appendChild(frag);
    }

    function openSheet()  { document.getElementById('bottomSheet').classList.add('show'); document.getElementById('overlay').classList.add('show'); document.getElementById('fab').classList.add('open'); setTimeout(()=>document.getElementById('inputTitle').focus(),350); }
    function closeSheet() { document.getElementById('bottomSheet').classList.remove('show'); document.getElementById('overlay').classList.remove('show'); document.getElementById('fab').classList.remove('open'); }
    function resetForm()  {
      ['inputTitle','inputChapter','inputCover'].forEach(id => { document.getElementById(id).value = id==='inputChapter'?'0':''; document.getElementById(id).classList.remove('error'); });
      document.getElementById('inputStatus').value='Leyendo'; document.getElementById('inputGenre').value='Acción';
      ['errorTitle','errorChapter','errorCover'].forEach(id => document.getElementById(id).classList.remove('show'));
    }

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
    }

    // AUTH
    const provider = new GoogleAuthProvider();

    document.getElementById('btnGoogle').addEventListener('click', async () => {
      document.getElementById('loginError').classList.remove('show');
      try { await signInWithPopup(auth, provider); }
      catch { document.getElementById('loginError').classList.add('show'); }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (state.unsub) state.unsub();
      await signOut(auth);
    });

    onAuthStateChanged(auth, user => {
      document.getElementById('loadingScreen').classList.add('hidden');
      if (user) {
        state.uid = user.uid;
        const av = document.getElementById('userAvatar');
        if (user.photoURL) av.src = user.photoURL; else av.style.display = 'none';
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('app').style.display = 'block';
        subscribeToItems();
      } else {
        state.uid = null; state.items = [];
        if (state.unsub) { state.unsub(); state.unsub = null; }
        document.getElementById('app').style.display = 'none';
        document.getElementById('loginScreen').classList.remove('hidden');
      }
    });

    // EVENTS
    document.getElementById('fab').addEventListener('click', () => document.getElementById('bottomSheet').classList.contains('show') ? closeSheet() : openSheet());
    document.getElementById('overlay').addEventListener('click', closeSheet);
    document.getElementById('tabs').addEventListener('click', e => {
      const btn = e.target.closest('.tab'); if (!btn) return;
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active'); state.filter = btn.dataset.filter; renderList();
    });
    document.getElementById('searchToggle').addEventListener('click', () => {
      const wrap = document.getElementById('searchWrap'); const inp = document.getElementById('searchInput');
      wrap.classList.toggle('open');
      if (wrap.classList.contains('open')) inp.focus();
      else { inp.value = ''; state.search = ''; renderList(); }
    });
    document.getElementById('searchInput').addEventListener('input', e => { state.search = e.target.value; renderList(); });
    document.getElementById('btnSubmit').addEventListener('click', addItem);
    document.getElementById('inputTitle').addEventListener('keydown', e => { if (e.key==='Enter') addItem(); });
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeSheet(); });
  </script>
</body>
</html>
